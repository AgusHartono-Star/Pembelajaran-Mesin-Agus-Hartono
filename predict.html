<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sensor Prediksi</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="container">
    <h2>🤖 AI Scanner</h2>

    <div id="status" class="status inactive">⛔ Sensor OFF</div>

    <div class="data-box" style="text-align: center; background: linear-gradient(135deg, #2563eb, #1e40af); border: none; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);">
        <h3 style="margin: 0; font-size: 12px; color: #93c5fd; text-transform: uppercase; letter-spacing: 2px;">Aktivitas Terdeteksi</h3>
        
        <h1 id="hasil_prediksi" style="margin: 15px 0; font-size: 32px; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.3);">-</h1>
        
        <p style="margin: 0; font-size: 14px; color: #f8fafc; font-weight: 600;">Keyakinan AI: <span id="hasil_conf" style="color: #6ee7b7; font-weight: 800; font-size: 16px;">-</span></p>
    </div>

    <div class="data-box" id="output">
        <div style="display: flex; justify-content: space-between; color: #94a3b8; font-size: 14px; margin-bottom: 12px; font-weight: bold;">
            <span>Buffer Data (Max 120):</span>
            <span id="count" style="color: #38bdf8;">0</span>
        </div>
        
        <hr style="border: 0; height: 1px; background: #334155; margin-bottom: 15px;">
        
        <div style="display: flex; justify-content: space-between; font-family: 'Courier New', Courier, monospace; font-size: 18px;">
            <div style="text-align: center; width: 30%;">
                <div style="color: #f43f5e; font-size: 11px; font-weight: bold; letter-spacing: 1px;">X-AXIS</div>
                <b id="valX">0.00</b>
            </div>
            <div style="text-align: center; width: 30%; border-left: 1px solid #334155; border-right: 1px solid #334155;">
                <div style="color: #22c55e; font-size: 11px; font-weight: bold; letter-spacing: 1px;">Y-AXIS</div>
                <b id="valY">0.00</b>
            </div>
            <div style="text-align: center; width: 30%;">
                <div style="color: #3b82f6; font-size: 11px; font-weight: bold; letter-spacing: 1px;">Z-AXIS</div>
                <b id="valZ">0.00</b>
            </div>
        </div>
    </div>

    <button id="startBtn" class="start" onclick="startSensor()">▶ Mulai Deteksi</button>
    <button id="stopBtn" class="stop" onclick="stopSensor()" disabled style="opacity: 0.5;">⏹ Berhenti</button>
</div>

<script src="/assets/predict.js"></script>
</body>
</html>
